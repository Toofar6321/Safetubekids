name: Build SafeStream APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Fix manifest
        run: cp manifest_clean.xml app/src/main/AndroidManifest.xml
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Build APK
        run: ./gradlew assembleDebug 2>&1 | tee /tmp/build.log; grep "^e:" /tmp/build.log | head -20 || true; exit ${PIPESTATUS[0]}
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SafeStream-AI
          path: "**/*.apk"
          retention-days: 30
