name: Build SafeStream APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Fix manifest
        run: cp manifest_clean.xml app/src/main/AndroidManifest.xml
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Build APK
        run: ./gradlew assembleDebug --info 2>&1 | grep "^e:" | head -30 || true
      - name: Build APK real
        run: ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SafeStream-AI
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
